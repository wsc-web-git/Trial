            const menu = document.getElementById(menuId);
            // Close the other menu if open
            if(menuId === 'dropdown-menu') document.getElementById('subtopic-dropdown').classList.remove('active');
            if(menuId === 'subtopic-dropdown') document.getElementById('dropdown-menu').classList.remove('active');
            
            menu.classList.toggle('active');
        }
        
        document.addEventListener('click', function(e) {
            const menu1 = document.getElementById('dropdown-menu');
            const menu2 = document.getElementById('subtopic-dropdown');
            if (menu1.classList.contains('active') && !e.target.closest('#global-menu-btn')) menu1.classList.remove('active');
            if (menu2.classList.contains('active') && !e.target.closest('#subtopic-menu-btn')) menu2.classList.remove('active');
        });

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            document.getElementById('theme-text').innerText = isDarkMode ? "Light Mode" : "Dark Mode";
        }

        function exitSubtopic() {
            alert("Exiting Subtopic... (Stand-alone mode)");
        }

        function getNextIndex() {
            let currentSubtopicData = subtopicsData[currentSubtopicIndex];
            let maxLen = currentSubtopicData.lessons.length - 1;
            if(currentLessonIndex < maxLen) return currentLessonIndex + 1;
            return maxLen;
        }

        function getPrevIndex() {
            if(currentLessonIndex === 0) return 0;
            return currentLessonIndex - 1;
        }

        function initTimer() {
            let currentSubtopicData = subtopicsData[currentSubtopicIndex];
            let sentences = currentSubtopicData.lessons[currentLessonIndex].sentences;
            let totalSeconds = 0;
            const rate = 0.95;
            const baseWPM = 140;
            const typeSpeedSec = 0.035;
            const gapSec = 0.3;

            sentences.forEach(raw => {
                let speechText = getSpeechText(raw);
                let words = speechText.split(/\s+/).filter(w => w.length > 0).length;
                let speechTime = (words / (baseWPM * rate)) * 60;
                let typingTime = raw.length * typeSpeedSec;
                totalSeconds += Math.max(speechTime, typingTime) + gapSec;
            });
            
            totalSeconds = Math.max(totalSeconds - gapSec, 1);
            estimatedTotalSeconds = Math.ceil(totalSeconds);
            currentTimerSeconds = estimatedTotalSeconds;
            
            updateTimerUI();
        }

        function startTimer() {
            if (readTimerInterval) clearInterval(readTimerInterval);
            let timerEl = document.getElementById('academic-timer');
            if (timerEl) timerEl.classList.add('active');
            readTimerInterval = setInterval(() => {
                if (currentTimerSeconds > 0) {
                    currentTimerSeconds--;
                    updateTimerUI();
                }
            }, 1000);
        }

        function pauseTimer() {
            if (readTimerInterval) {
                clearInterval(readTimerInterval);
                readTimerInterval = null;
            }
            let timerEl = document.getElementById('academic-timer');
            if (timerEl) timerEl.classList.remove('active');
        }

        function resetTimer() {
            currentTimerSeconds = estimatedTotalSeconds;
            updateTimerUI();
            let timerEl = document.getElementById('academic-timer');
            if (timerEl) timerEl.classList.remove('active');
        }

        function updateTimerUI() {
            let remainingSeconds = currentTimerSeconds;
            if (isNaN(remainingSeconds) || remainingSeconds < 0) remainingSeconds = 0;
            
            let minutes = Math.floor(remainingSeconds / 60);
            let seconds = Math.floor(remainingSeconds % 60);
            let display = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
            
            let timerDisplay = document.getElementById('timer-display');
            if (timerDisplay) {
                timerDisplay.textContent = display;
            }
        }

        function jumpToLesson(index, skipDuster = false) {
            document.getElementById('subtopic-dropdown').classList.remove('active');
            let currentSubtopicData = subtopicsData[currentSubtopicIndex];
            if(index >= currentSubtopicData.lessons.length) return;
            currentLessonIndex = index;
            
            document.getElementById('st-subtitle-text').innerText = currentSubtopicData.lessonTitles[index];
            document.getElementById('choice-box').style.display = 'none';
            document.getElementById('subtopic-menu-btn').classList.remove('pulse-attention');
            
            if(document.getElementById('board-text')) {
                 document.getElementById('board-text').classList.remove('reading-done');
            }
            
            stopReadingFull();
            initTimer(); 

            if (skipDuster) {
                document.getElementById('board-text').innerHTML = "";
                currentSentenceIndex = 0;
                resetPlayButton();
            } else {
                document.getElementById('board-text').innerHTML = "";
                currentSentenceIndex = 0;
                resetPlayButton();
            }
        }

        function startFullReadPress(e) {
            if(fullReadTimer) clearTimeout(fullReadTimer);
            isLongPressFired = false;
            fullReadTimer = setTimeout(() => {
                isLongPressFired = true;
                displayFullContentImmediate();
            }, 2000);
        }

        function cancelFullReadPress(e) {
            if(fullReadTimer) clearTimeout(fullReadTimer);
        }

        function setReadMode(mode) {
            if(isLongPressFired && mode === 'full') {
                isLongPressFired = false;
                return; 
            }
            readMode = mode;
            document.getElementById('mode-full').classList.remove('active');
            document.getElementById('mode-sentence').classList.remove('active');
            document.getElementById(`mode-${mode}`).classList.add('active');
            stopReadingFull();
        }

        function displayFullContentImmediate() {
            stopReadingFull();
            pauseTimer();
            resetTimer(); 

            let currentSubtopicData = subtopicsData[currentSubtopicIndex];
            let lesson = currentSubtopicData.lessons[currentLessonIndex];
            let board = document.getElementById('board-text');
            board.innerHTML = "";
            
            let fullHTML = "";
            
            for(let i=0; i<lesson.sentences.length; i++) {
                let raw = lesson.sentences[i];
                let isHeading = raw.startsWith("[H]");
                let isSub = raw.startsWith("[SH]");
                let isList = raw.startsWith("[L]");
                
                let tag = (isHeading || isSub || isList) ? 'div' : 'span';
                let className = "";
                if (isHeading) className = "lesson-heading";
                else if (isSub) className = "lesson-subheading";
                else if (isList) className = "list-item";
                
                let style = (isHeading && i > 0) ? 'margin-top: 30px;' : '';
                let contentHTML = "";
                
                let textRaw = raw.replace(/^\[H\]\s*|^\[SH\]\s*|^\[L\]\s*/, "");
                contentHTML = textRaw
                    .replace(/Logic/gi, "<span class='hl-orange'>Logic</span>")
                    .replace(/True/g, "<span class='hl-green'>True</span>")
                    .replace(/False/g, "<span class='hl-blue'>False</span>")
                    .replace(/Statement/gi, "<span class='hl-orange'>Statement</span>");
                if (!isHeading && !isSub && !isList) {
                    contentHTML = " " + contentHTML;
                }
                
                fullHTML += `<${tag} class="${className}" style="${style}">${contentHTML}</${tag}>`;
            }
            
            board.innerHTML = fullHTML;
            if (window.MathJax && fullHTML.includes('\\(')) {
                MathJax.typesetPromise([board]).then(()=>{}).catch((err) => console.log(err));
            }
            
            currentSentenceIndex = lesson.sentences.length;
            finishLessonBlock();
        }

        function getSpeechText(text) {
            let stripped = text.replace(/\[H\]|\[SH\]|\[L\]/g, "");
            stripped = stripped.replace(/<[^>]+>/gm, ''); 
            stripped = stripped.replace(/[\u{1F300}-\u{1F9FF}\u{2700}-\u{27BF}\u{2600}-\u{26FF}\u{1FA00}-\u{1FAFF}]/gu, ''); 
            
            stripped = stripped.replace(/\\leftrightarrow/gi, ' Double Implication ');
            stripped = stripped.replace(/\\Leftrightarrow/gi, ' Double Implication ');
            stripped = stripped.replace(/↔/g, ' Double Implication ');

            stripped = stripped.replace(/\\le/g, ' less than or equal to ');
            stripped = stripped.replace(/\\ge/g, ' greater than or equal to ');
            stripped = stripped.replace(/≤/g, ' less than or equal to ');
            stripped = stripped.replace(/≥/g, ' greater than or equal to ');
            stripped = stripped.replace(/</g, ' less than ');
            stripped = stripped.replace(/>/g, ' greater than ');
            stripped = stripped.replace(/\\equiv/g, ' equivalent to ');
            stripped = stripped.replace(/≡/g, ' equivalent to ');
            stripped = stripped.replace(/\\times/g, ' multiplied by ');
            
            stripped = stripped.replace(/\\wedge/g, ' And ');
            stripped = stripped.replace(/\\vee/g, ' or ');
            stripped = stripped.replace(/\\rightarrow/g, ' implies ');
            stripped = stripped.replace(/\\sim/g, ' Negation ');

            stripped = stripped.replace(/∧/g, ' And ');
            stripped = stripped.replace(/∨/g, ' or ');
            stripped = stripped.replace(/→/g, ' implies ');
            stripped = stripped.replace(/~/g, ' Negation ');

            stripped = stripped.replace(/\\\(/g, '').replace(/\\\)/g, '');
            
            stripped = stripped.replace(/\bOR\b/g, ' or ');
            stripped = stripped.replace(/≠/g, ' NOT EQUAL TO ');
            stripped = stripped.replace(/\\neq/g, ' NOT EQUAL TO ');
            stripped = stripped.replace(/-/g, ' minus ');
            
            stripped = stripped.replace(/\(/g, ' bracket start ');
            stripped = stripped.replace(/\)/g, ' bracket close ');
            stripped = stripped.replace(/\[/g, ' big bracket start ');
            stripped = stripped.replace(/\]/g, ' big bracket close ');
            return stripped;
        }

        // === REPLAY BUTTON LOGIC FIXED ===
        function toggleReading() {
            let currentSubtopicData = subtopicsData[currentSubtopicIndex];
            
            if (ttsState === 'playing') {
                pauseReading();
            } else if (ttsState === 'paused') {
                resumeReading();
            } else {
                if(currentSentenceIndex >= currentSubtopicData.lessons[currentLessonIndex].sentences.length) {
                    document.getElementById('board-text').innerHTML = ""; // Clear the board
                    currentSentenceIndex = 0; // Reset index to start
                    document.getElementById('board-text').classList.remove('reading-done');
                    document.getElementById('choice-box').style.display = 'none';
                    document.getElementById('subtopic-menu-btn').classList.remove('pulse-attention');
                    resetTimer();
                    startSentencePlayback(); // Trigger playback directly
                    return; // Prevent fallthrough
                }
                startSentencePlayback();
            }
        }

        function pauseReading() {
            ttsState = 'paused';
            clearInterval(typeInterval);
            window.speechSynthesis.cancel(); 
            pauseTimer();
            
            let btn = document.getElementById('btn-read-action');
            btn.innerHTML = '<i class="fa-solid fa-play"></i> Resume';
            btn.classList.add('btn-breathe');
        }

        function resumeReading() {
            ttsState = 'playing';
            let btn = document.getElementById('btn-read-action');
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg> Pause';
            btn.classList.remove('btn-breathe');
            
            let remainingRaw = currentRawText.substring(charIdx);
            let speechText = getSpeechText(remainingRaw);
            speechText = speechText.replace(/∼/g, ' Negation ').replace(/~/g, ' Negation ').replace(/∧/g, ' And ').replace(/∨/g, ' Or ').replace(/→/g, ' Implies ').replace(/↔/g, ' Double implies ').replace(/∀/g, ' For all ').replace(/∃/g, ' There exists ');

            if (speechText.trim().length > 0) {
                currentUtterance = new SpeechSynthesisUtterance(speechText);
                currentUtterance.rate = 0.95; 
                currentUtterance.pitch = 1.0;
                currentUtterance.onend = () => { handleSentenceEnd(); };
                window.speechSynthesis.speak(currentUtterance);
            } else {
                setTimeout(handleSentenceEnd, 100);
            }

            typeInterval = setInterval(typeWriterStep, typeSpeed);
            startTimer();
        }

        function stopReadingFull() {
            ttsState = 'stopped';
            clearInterval(typeInterval);
            window.speechSynthesis.cancel();
            pauseTimer();
            resetPlayButton();
        }

        function resetPlayButton() {
            let btn = document.getElementById('btn-read-action');
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Play';
            btn.classList.remove('btn-breathe');
        }

        function startSentencePlayback() {
            let currentSubtopicData = subtopicsData[currentSubtopicIndex];
            
            if(currentSentenceIndex >= currentSubtopicData.lessons[currentLessonIndex].sentences.length) {
                finishLessonBlock();
                return;
            }

            ttsState = 'playing';
            let btn = document.getElementById('btn-read-action');
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg> Pause';
            btn.classList.remove('btn-breathe');

            window.speechSynthesis.cancel(); 

            let raw = currentSubtopicData.lessons[currentLessonIndex].sentences[currentSentenceIndex];
            
            let isHeading = raw.startsWith("[H]");
            let isSub = raw.startsWith("[SH]");
            let isList = raw.startsWith("[L]");

            let board = document.getElementById('board-text');
            currentSpan = document.createElement((isHeading || isSub || isList) ? 'div' : 'span');
            
            if (isHeading) {
                currentSpan.className = 'lesson-heading';
                if (currentSentenceIndex > 0) { currentSpan.style.marginTop = "30px"; }
            } else if (isSub) {
                currentSpan.className = 'lesson-subheading';
            } else if (isList) {
                currentSpan.className = 'list-item';
            } else {
                board.appendChild(document.createTextNode(" "));
            }

            currentRawText = raw.replace(/^\[H\]\s*|^\[SH\]\s*|^\[L\]\s*/, "");
            currentStyledHTML = currentRawText
                .replace(/Logic/gi, "<span class='hl-orange'>Logic</span>")
                .replace(/True/g, "<span class='hl-green'>True</span>")
                .replace(/False/g, "<span class='hl-blue'>False</span>")
                .replace(/Statement/gi, "<span class='hl-orange'>Statement</span>");
                
            let speechText = getSpeechText(raw);
            speechText = speechText.replace(/∼/g, ' Negation ').replace(/~/g, ' Negation ').replace(/∧/g, ' And ').replace(/∨/g, ' Or ').replace(/→/g, ' Implies ').replace(/↔/g, ' Double implies ').replace(/∀/g, ' For all ').replace(/∃/g, ' There exists ');
            board.appendChild(currentSpan);

            charIdx = 0;
            typeInterval = setInterval(typeWriterStep, typeSpeed);
            startTimer();

            setTimeout(() => {
                if (ttsState !== 'playing') return;
                currentUtterance = new SpeechSynthesisUtterance(speechText);
                currentUtterance.rate = 0.95; 
                currentUtterance.pitch = 0.9;
                currentUtterance.lang = 'en-IN';
                // Force Indian English male voice
                try {
                    let voices = window.speechSynthesis.getVoices();
                    let indianMale = voices.find(v => v.lang === 'en-IN' && /male|Ravi|Prabhat|Ajit/i.test(v.name)) 
                                   || voices.find(v => v.lang === 'en-IN')
                                   || voices.find(v => v.lang.toLowerCase().startsWith('en-in'));
                    if (indianMale) { currentUtterance.voice = indianMale; }
                } catch(e) {}
                currentUtterance.onend = () => { handleSentenceEnd(); };
                window.speechSynthesis.speak(currentUtterance);
            }, 300); 
        }

        function handleSentenceEnd() {
            let currentSubtopicData = subtopicsData[currentSubtopicIndex];
            currentSentenceIndex++;
            
            if(readMode === 'full') {
                if(ttsState === 'playing') {
                    setTimeout(() => { if(ttsState === 'playing') startSentencePlayback(); }, 300);
                }
            } else {
                ttsState = 'stopped';
                let btn = document.getElementById('btn-read-action');
                btn.innerHTML = '<i class="fa-solid fa-play"></i> Read Next';
                btn.classList.add('btn-breathe');
                pauseTimer();
                if(currentSentenceIndex >= currentSubtopicData.lessons[currentLessonIndex].sentences.length) {
                    finishLessonBlock();
                }
            }
        }

        function typeWriterStep() {
            if (charIdx < currentRawText.length) {
                currentSpan.innerText = currentRawText.substring(0, charIdx + 1); 
                charIdx++;
                document.getElementById('board-area').scrollTop = document.getElementById('board-area').scrollHeight;
            } else {
                clearInterval(typeInterval);
                currentSpan.innerHTML = currentStyledHTML; 
                
                if (window.MathJax && currentStyledHTML.includes('\\(')) {
                    MathJax.typesetPromise([currentSpan]).catch((err) => console.log(err));
                }
                
                document.getElementById('board-area').scrollTop = document.getElementById('board-area').scrollHeight;
            }
        }

        function renderDynamicNavChoices() {
            let currentSubtopicData = subtopicsData[currentSubtopicIndex];
            let box = document.getElementById('choice-box');
            box.innerHTML = ''; 

            let prevDisabled = (currentLessonIndex === 0) ? 'disabled' : '';
            let btnPrev = `<button class="drop-btn nav-btn" style="flex:1; justify-content:center; background: linear-gradient(135deg, #FF416C, #FF4B2B);" onclick="jumpToLesson(${getPrevIndex()})" ${prevDisabled}> <i class="fa-solid fa-backward"></i> Previous</button>`;
            
            let btnNext = "";
            if (currentLessonIndex === currentSubtopicData.lessons.length - 1) {
                // Since there is only one subtopic loaded, disable Next at the very end
                btnNext = `<button class="drop-btn nav-btn" style="flex:1; justify-content:center; background: var(--text-muted);" disabled>End of Subtopic <i class="fa-solid fa-check-double"></i></button>`;
            } else {
                btnNext = `<button class="drop-btn nav-btn" style="flex:1; justify-content:center; background: linear-gradient(135deg, #11998e, #38ef7d);" onclick="jumpToLesson(${getNextIndex()})">Next <i class="fa-solid fa-forward"></i></button>`;
            }

            let navGroup = `<div style="display:flex; gap:10px; width:100%; margin-top: 10px;">${btnPrev}${btnNext}</div>`;

            box.innerHTML = navGroup;
            box.style.display = 'flex';
        }

        function finishLessonBlock() {
            stopReadingFull();
            pauseTimer();
            
            currentTimerSeconds = 0; 
            updateTimerUI();
            
            document.getElementById('btn-read-action').innerHTML = '<i class="fa-solid fa-rotate-left"></i> Replay';
            document.getElementById('board-text').classList.add('reading-done');
            document.getElementById('subtopic-menu-btn').classList.add('pulse-attention');

            renderDynamicNavChoices();
            
            setTimeout(() => {
                document.getElementById('board-area').scrollTop = document.getElementById('board-area').scrollHeight;
            }, 100);
        }
    </script>

<!-- === COPY TEXT FEATURE ADDED - does not modify previous code === -->
<script id="copy-text-enabler">
(function(){
  // Inject CSS to re-enable text selection for all non-button elements
  const style = document.createElement('style');
  style.textContent = `
    /* Allow copying text everywhere except buttons */
    body, #app-container, .board-area, #board-text, .text-3d-card,
    .lesson-heading, .lesson-subheading, .list-item,
    .brand, .brand-big, .subtopic-title, .lesson-name,
    p, span, div, h1, h2, h3 {
      -webkit-user-select: text !important;
      -moz-user-select: text !important;
      -ms-user-select: text !important;
      user-select: text !important;
      -webkit-touch-callout: default !important;
    }
    /* Keep buttons non-selectable */
    button, button *, .drop-btn, .drop-btn *, .nav-btn, .nav-btn *,
    .subtopic-btn, .subtopic-btn *, .icon-circle, .icon-circle *,
    .read-btn, .read-btn *, .controls, .controls * {
      -webkit-user-select: none !important;
      -moz-user-select: none !important;
      -ms-user-select: none !important;
      user-select: none !important;
      -webkit-touch-callout: none !important;
    }
  `;
  document.head.appendChild(style);

  // When user touches any text (not a button), select it so copy menu appears
  function isButton(el) {
    return el.closest('button, .drop-btn, .nav-btn, .subtopic-btn, .icon-circle, .read-btn, .controls');
  }

  document.addEventListener('touchend', function(e) {
    if (isButton(e.target)) return; // skip buttons
    
    const target = e.target.closest('#board-text, .lesson-heading, .lesson-subheading, .list-item, .text-3d-card, .brand, .brand-big, .subtopic-title, .lesson-name, p, span');
    if (!target) return;
    
    // Select the text content to trigger native copy menu
    try {
      const range = document.createRange();
      range.selectNodeContents(target);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    } catch(err) {}
  }, {passive: true});

  // Also support mouse click for desktop testing
  document.addEventListener('mouseup', function(e) {
    if (isButton(e.target)) return;
    const target = e.target.closest('#board-text, .lesson-heading, .lesson-subheading, .list-item, .text-3d-card');
    if (!target) return;
    // selection already handled by browser
  });
})();
</script>
